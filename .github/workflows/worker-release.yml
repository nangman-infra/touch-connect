name: tc-worker release

on:
  push:
    tags:
      - "worker-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example worker-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish tc-worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            worker-v*) ;;
            *) echo "tc-worker release tags must start with worker-v: $tag" >&2; exit 1 ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Run worker release readiness gate
        run: scripts/worker-release-readiness.sh "${{ steps.release.outputs.tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          files=(dist/tc-worker_*.tar.gz dist/checksums.txt dist/worker-release-manifest.json)
          notes_file=".github/release-notes/${tag}.md"
          create_flags=()
          edit_flags=()
          case "$tag" in
            *-alpha*|*-beta*|*-rc*)
              create_flags+=(--prerelease)
              create_flags+=(--latest=false)
              edit_flags+=(--prerelease)
              ;;
          esac
          if gh release view "$tag" >/dev/null 2>&1; then
            if [ -f "${notes_file}" ]; then
              gh release edit "$tag" \
                --title "tc-worker ${tag}" \
                --notes-file "${notes_file}" \
                "${edit_flags[@]}"
            else
              gh release edit "$tag" \
                --title "tc-worker ${tag}" \
                "${edit_flags[@]}"
            fi
            gh release upload "$tag" "${files[@]}" --clobber
          else
            if [ -f "${notes_file}" ]; then
              gh release create "$tag" "${files[@]}" \
                "${create_flags[@]}" \
                --verify-tag \
                --title "tc-worker ${tag}" \
                --notes-file "${notes_file}"
            else
              gh release create "$tag" "${files[@]}" \
                "${create_flags[@]}" \
                --verify-tag \
                --title "tc-worker ${tag}" \
                --generate-notes
            fi
          fi
